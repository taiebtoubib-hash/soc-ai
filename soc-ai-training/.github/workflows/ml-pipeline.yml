name: ML Training Pipeline

on:
  # 1) Run automatically every Sunday at midnight
  schedule:
    - cron: '0 0 * * 0'
  # 2) Allow manual trigger from the GitHub UI
  workflow_dispatch: 

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Required to push the new models back to the repo later
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost joblib pyarrow

      - name: Run ML Pipeline
        run: |
          # This command automatically runs all 6 steps:
          # 01_collect -> 02_prepare -> 03_train -> 04_evaluate -> 05_promote -> 06_monitor
          python training/pipeline.py
          
      - name: Commit and Push New Models
        # Only commit if the pipeline succeeded (which implies either candidate won, or no critical drift)
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the new/updated models and evaluation report
          git add ml_models/production/ ml_models/versions/ ml_models/candidate/evaluation_report.json datasets/processed/
          
          # If there are changes, commit and push
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-update ML models [skip ci]" && git push)
