services:

  # ─────────────────────────────────────────────
  #  INFRASTRUCTURE — Kafka + Zookeeper + UI
  # ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: soc-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - soc-net
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo ruok | nc localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: soc-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092" # host access (for local scripts / simulate_alerts.py)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_MS: 86400000 # 24h retention
      KAFKA_MESSAGE_MAX_BYTES: 10485760 # 10MB max message
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - soc-net
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: soc-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - soc-net
    volumes:
      - ./infra/kafka/init-topics.sh:/init-topics.sh
    entrypoint: [ "/bin/bash", "/init-topics.sh" ]
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: soc-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: soc-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - soc-net

  # ─────────────────────────────────────────────
  #  Vector Database — ChromaDB
  # ─────────────────────────────────────────────

  chroma:
    image: chromadb/chroma:latest
    container_name: soc-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - soc-net

  ollama:
    image: ollama/ollama:latest
    container_name: soc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - soc-net
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: soc-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - soc-net
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull mistral:7b && echo '>>> Model ready <<<'"
    restart: "no"

  # ─────────────────────────────────────────────
  #  SOC AI Agents
  # ─────────────────────────────────────────────

  agent-collector:
    build:
      context: .
      dockerfile: agents/01_collector/Dockerfile
    container_name: soc-agent-collector
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
    volumes:
      - /var/log/suricata:/var/log/suricata:ro # mounted on Linux host only
    networks:
      - soc-net

  agent-analysis:
    build:
      context: .
      dockerfile: agents/02_analysis/Dockerfile
    container_name: soc-agent-analysis
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
    networks:
      - soc-net

  agent-detection:
    build:
      context: .
      dockerfile: agents/03_detection/Dockerfile
    container_name: soc-agent-detection
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - soc-net

  agent-ml-classifier:
    build:
      context: .
      dockerfile: agents/04_ml_classifier/Dockerfile
    container_name: soc-agent-ml-classifier
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
    volumes:
      - ./ml_models:/app/ml_models:ro
    networks:
      - soc-net

  agent-fp-detector:
    build:
      context: .
      dockerfile: agents/04b_fp_detector/Dockerfile
    container_name: soc-agent-fp-detector
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
    volumes:
      - ./ml_models:/app/ml_models:ro
    networks:
      - soc-net

  agent-orchestrator:
    build:
      context: .
      dockerfile: agents/05_orchestrator/Dockerfile
    container_name: soc-agent-orchestrator
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./playbooks:/app/playbooks:ro
    networks:
      - soc-net

  agent-response:
    build:
      context: .
      dockerfile: agents/06_response/Dockerfile
    container_name: soc-agent-response
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USE_KAFKA=true
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./logs:/app/logs
    networks:
      - soc-net

  soc-api:
    build:
      context: .
      dockerfile: agents/07_api/Dockerfile
    container_name: soc-api
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8001:8000"
    networks:
      - soc-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  soc-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc-dashboard
    restart: unless-stopped
    depends_on:
      soc-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - soc-net

# ─────────────────────────────────────────────
#  Networks & Volumes
# ─────────────────────────────────────────────

networks:
  soc-net:
    driver: bridge
    name: soc-net

volumes:
  kafka_data:
  chroma_data:
  ollama_data:
